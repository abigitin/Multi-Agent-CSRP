services:
  - type: web
    name: agenticai-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: MCP_MODE
        value: in-process
      - key: NOTIFICATION_MODE
        value: smtp
      - key: MAIL_PROVIDER
        value: gmail_smtp
      - key: MAIL_FROM
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        value: customer-support
      - key: PINECONE_NAMESPACE
        value: __default__
      - key: PINECONE_HOST
        sync: false
      - key: PINECONE_EMBED_FIELD
        value: text
      - key: PINECONE_INTEGRATED_EMBEDDING
        value: "true"

